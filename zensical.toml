[project]
site_name = "omni-weather-forecast-apis"
site_description = "Async Python library that fans out forecast requests across multiple weather providers and normalizes the results into one typed Pydantic schema."
site_url = "https://hbmartin.github.io/omni-weather-forecast-apis/"
repo_url = "https://github.com/hbmartin/omni-weather-forecast-apis"
repo_name = "hbmartin/omni-weather-forecast-apis"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Configuration" = "configuration.md" },
  { "Providers" = "providers.md" },
  { "CLI" = "cli.md" },
  { "Extending" = "extending.md" },
  { "API Reference" = "api-reference.md" },
]

[project.theme]
features = [
  "navigation.sections",
  "navigation.top",
  "content.code.copy",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "blue"
toggle.icon = "material/weather-night"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "blue"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true

[project.plugins.search]

[project.plugins.mkdocstrings.config.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.config.handlers.python.options]
docstring_style = "google"
show_source = false
members_order = "source"
separate_signature = true
show_signature_annotations = true
