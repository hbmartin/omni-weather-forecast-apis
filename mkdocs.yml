site_name: omni-weather-forecast-apis
site_description: >-
  Async Python library that fans out forecast requests across multiple
  weather providers and normalizes the results into one typed Pydantic schema.
site_url: https://hbmartin.github.io/omni-weather-forecast-apis/
repo_url: https://github.com/hbmartin/omni-weather-forecast-apis
repo_name: hbmartin/omni-weather-forecast-apis

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Providers: providers.md
  - CLI: cli.md
  - Extending: extending.md
  - API Reference: api-reference.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
