name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: |
          uv sync --dev --extra cli

      - name: Run Ruff check
        run: |
          uv run ruff check src

      - name: Check Ruff formatting
        run: |
          uv run ruff format --check src tests

      - name: Check repository policy patterns with Semgrep
        run: |
          uvx --from semgrep==1.169.0 semgrep scan --config semgrep_rules/ --error src .github/workflows
          uvx --from semgrep==1.169.0 semgrep test semgrep_rules/

      - name: Run Pyrefly check
        run: |
          uv run pyrefly check src

      - name: Run ty check
        run: |
          uv run ty check src

      - name: Check dependencies with Deptry
        run: |
          uv run deptry src --github-output

      - name: Check package metadata with Pyroma
        run: |
          uv run pyroma --min 8 .

      - name: Check complexity and duplication with Lizard
        run: |
          uv run lizard -Eduplicate -C 27 src

      - name: Run tests
        run: |
          uv run pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          disable_search: true
          fail_ci_if_error: true
          root_dir: .
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
